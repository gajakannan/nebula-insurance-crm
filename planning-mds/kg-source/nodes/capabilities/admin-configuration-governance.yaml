id: capability:admin-configuration-governance
label: Admin Configuration Governance
rationale:
  - adr: adr:016
    section: Decision
    summary: Runtime business configuration is governed through versioned, validated, published
      configuration sets with audit and rollback evidence.
  - adr: adr:032
    section: Decision
    summary: F0032 implements a governed facade over module-owned configuration domains instead
      of creating a parallel execution engine.
related_nodes:
