id: capability:billing-invoicing-reconciliation
label: Billing, Invoicing, and Reconciliation
notes: >-
  Internal agency-bill operational invoicing, manual/mock-CSV receipt capture, explicit exact application,
  exception handling, controlled balance corrections, and source-filtered backlog visibility. Excludes direct
  bill, real payment connectivity, tolerance/write-off behavior, ledger, tax, settlement, and statements.
