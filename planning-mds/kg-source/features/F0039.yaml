notes:
  - 'F0039 re-derived (plan run 2026-07-21-6eeb172f) from the F0038 as-built seams + the authored design
    spec (neuron-phi-intent-security-implementation-spec.md; local Phi runtime verified 2026-07-21). Two
    halves: durable owner-scoped conversations (ADR-028 §1 extended with a server message sequence +
    idempotency) and a local Phi structured scope-and-intent resolver behind deterministic fail-closed
    validation (ADR-035). The engine remains the sole authorization boundary; the model owns no
    auth/registration/validation (spec §7.3).'
  - 'S0009 (contextual adjudicator) is GATED — enabled only after S0001–S0008 direct-routing + context
    gates pass. An open-ended crm.response_composer is explicitly out of scope (a later feature).'
  - 'code-index.yaml bindings intentionally deferred: no neuron/ implementation code exists at plan; the
    F0039 feature action binds the as-built neuron/ + experience/ paths.'
phase: Neuron Companion
rationale: Durable owner-scoped conversation store + thread-management UX **and** a local Microsoft Phi
  structured scope-and-intent resolver (behind deterministic fail-closed validation) replacing the F0038
  mock/deterministic seam. Requirements committed + architecture authored in plan run `2026-07-21-6eeb172f`
  (9 stories, S0009 gated). Depends on F0038's persistence ADR (ADR-028) + as-built seams.
restricted_to_role:
  - role:underwriter
roadmap_order: 3
roadmap_section: Next
