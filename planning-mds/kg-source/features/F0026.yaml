archived_date: '2026-07-19'
completion_state: 'Done and archived (2026-07-19, feature run `2026-07-19-86ad3248`) — 6 stories: billing workspace and policy context, agency-bill invoice creation, manual/mock receipt capture, exact reconciliation, correction approval, and backlog/audit visibility'
depends_on:
  - feature:F0018
  - feature:F0025
governed_by:
  - adr:034
notes:
  - Phase A refined on 2026-07-19 via plan run 2026-07-19-79477865. Operator confirmed agency-bill-only
    scope, manual and mock-vendor CSV receipts, explicit exact currency/full-outstanding application,
    no automatic tolerance or write-off, and Finance Operations Analyst/Finance Manager separation
    of duties.
  - F0030 is a deferred production integration seam, not a first-release dependency. Direct bill,
    real bank/payment connectivity, partial/overpayment allocation, ledger, tax, and settlement remain
    out of scope.
  - Operator promoted F0026 from Later to Now on 2026-07-19 after confirming that completed F0018 and
    F0025 satisfy the direct dependency boundary and that the approved plan should proceed toward build.
  - Phase B approved in plan run 2026-07-19-79477865 with explicit operator token `approve`. ADR-034 defines the in-process BillingReconciliation
    module, explicit exact-only application, versioned bounded mock CSV profile, source/reference idempotency,
    Finance Operations Analyst/Finance Manager separation of duties, and permission-safe aggregates.
phase: Brokerage Platform Expansion
rationale: Direct dependencies F0018 and F0025 are complete, and the approved agency-bill slice is the next build-ready brokerage platform expansion.
