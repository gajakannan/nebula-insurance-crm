version: 0
status: seed
coverage_note: >
  This file binds stable solution node IDs to implementation paths in engine/,
  experience/, and security policy artifacts so agents can route into code
  without broad repo scans. These bindings are retrieval hints only; raw source
  files remain authoritative.

node_bindings:
